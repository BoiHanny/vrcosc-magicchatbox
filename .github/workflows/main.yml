name: .NET Core Desktop Build and Release

on:
  push:
    branches:
      - 'Pre-Master'
      - 'master'
    tags:
      - 'v*'

env:
  Solution_Name: vrcosc-magicchatbox.sln
  Project_Path: vrcosc-magicchatbox\MagicChatbox.csproj
  DOTNET_ROOT: C:\Program Files\dotnet

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Step 1: Extract version from the csproj
    - name: Extract Version from csproj
      shell: pwsh
      run: |
        $csproj = "${{ env.Project_Path }}"
        $pattern = '<Version>(.*)</Version>'
        $content = Get-Content $csproj -Raw
        $match = [regex]::Match($content, $pattern)
        if ($match.Success -and $match.Groups.Count -gt 1) {
          $version = $match.Groups[1].Value
          echo "VERSION=$version" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
        }
        else {
          Write-Error "Error: Version not found in csproj file."
          exit 1
        }

    # Step 2: Resolve the release tag for this run
    - name: Resolve Release Tag
      id: resolve_release
      shell: pwsh
      run: |
        $csprojVersion = $env:VERSION
        $isTagRelease = $env:GITHUB_REF -like 'refs/tags/*'

        if ($isTagRelease) {
          $releaseTag = $env:GITHUB_REF_NAME

          if (-not $releaseTag.StartsWith('v')) {
            Write-Error "Release tags must start with 'v'. Found '$releaseTag'."
            exit 1
          }

          $tagVersion = $releaseTag.Substring(1)
          if ($tagVersion -ne $csprojVersion) {
            Write-Error "Tag version '$tagVersion' does not match csproj version '$csprojVersion'."
            exit 1
          }
        }
        else {
          $releaseTag = "v$csprojVersion"
        }

        "RELEASE_TAG=$releaseTag" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
        "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "is_tag_release=$($isTagRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    # Step 3: Check if a release with this tag already exists
    - name: Check if Release Exists
      id: check_release
      uses: actions/github-script@v7
      with:
        script: |
          const tag = `${{ steps.resolve_release.outputs.release_tag }}`;
          try {
            await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });
            core.setOutput('release_exists', 'true');
          } catch (error) {
            if (error.status === 404) {
              core.setOutput('release_exists', 'false');
            } else {
              throw error;
            }
          }

    - name: Ensure Release Tag Exists (Actions token)
      if: steps.resolve_release.outputs.is_tag_release != 'true' && steps.check_release.outputs.release_exists == 'false'
      id: ensure_tag_actions
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const tag = `${{ steps.resolve_release.outputs.release_tag }}`;
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          try {
            await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tag}`
            });
            core.setOutput('tag_ready', 'true');
            core.setOutput('tag_source', 'existing');
          } catch (error) {
            if (error.status !== 404) {
              core.setOutput('tag_ready', 'false');
              core.setOutput('failure_message', `Failed checking tag ${tag} with github.token: ${error.message}`);
              return;
            }

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              core.setOutput('tag_ready', 'true');
              core.setOutput('tag_source', 'created-actions-token');
            } catch (createError) {
              core.setOutput('tag_ready', 'false');
              core.setOutput('failure_message', `Failed creating tag ${tag} with github.token: ${createError.message}`);
            }
          }

    - name: Ensure Release Tag Exists (MY_PAT fallback)
      if: steps.resolve_release.outputs.is_tag_release != 'true' && steps.check_release.outputs.release_exists == 'false' && steps.ensure_tag_actions.outputs.tag_ready != 'true'
      id: ensure_tag_pat
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.MY_PAT }}
        script: |
          const tag = `${{ steps.resolve_release.outputs.release_tag }}`;
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          try {
            await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tag}`
            });
            core.setOutput('tag_ready', 'true');
            core.setOutput('tag_source', 'existing');
          } catch (error) {
            if (error.status !== 404) {
              core.setOutput('tag_ready', 'false');
              core.setOutput('failure_message', `Failed checking tag ${tag} with MY_PAT: ${error.message}`);
              return;
            }

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              core.setOutput('tag_ready', 'true');
              core.setOutput('tag_source', 'created-my-pat');
            } catch (createError) {
              core.setOutput('tag_ready', 'false');
              core.setOutput('failure_message', `Failed creating tag ${tag} with MY_PAT: ${createError.message}`);
            }
          }

    - name: Finalize Branch Release Path
      if: steps.resolve_release.outputs.is_tag_release != 'true' && steps.check_release.outputs.release_exists == 'false'
      id: finalize_branch_release
      env:
        PRIMARY_READY: ${{ steps.ensure_tag_actions.outputs.tag_ready }}
        PRIMARY_SOURCE: ${{ steps.ensure_tag_actions.outputs.tag_source }}
        PRIMARY_FAILURE: ${{ steps.ensure_tag_actions.outputs.failure_message }}
        FALLBACK_READY: ${{ steps.ensure_tag_pat.outputs.tag_ready }}
        FALLBACK_SOURCE: ${{ steps.ensure_tag_pat.outputs.tag_source }}
        FALLBACK_FAILURE: ${{ steps.ensure_tag_pat.outputs.failure_message }}
      shell: pwsh
      run: |
        $primaryReady = $env:PRIMARY_READY
        $primarySource = $env:PRIMARY_SOURCE
        $fallbackReady = $env:FALLBACK_READY
        $fallbackSource = $env:FALLBACK_SOURCE
        $primaryFailure = $env:PRIMARY_FAILURE
        $fallbackFailure = $env:FALLBACK_FAILURE

        if ($primaryReady -ne 'true' -and $fallbackReady -ne 'true') {
          $failures = @()

          if (-not [string]::IsNullOrWhiteSpace($primaryFailure.Trim())) {
            $failures += $primaryFailure.Trim()
          }

          if (-not [string]::IsNullOrWhiteSpace($fallbackFailure.Trim())) {
            $failures += $fallbackFailure.Trim()
          }

          $details = if ($failures.Count -gt 0) { $failures -join ' || ' } else { "No additional error details were returned." }
          Write-Error "Unable to ensure release tag $env:RELEASE_TAG for this branch push. $details"
          exit 1
        }

        $tagSource = if ($primaryReady -eq 'true') { $primarySource } else { $fallbackSource }
        $publishNow = if ($tagSource -like 'created-*') { 'false' } else { 'true' }

        "tag_source=$tagSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "publish_now=$publishNow" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    # Step 4: If the release already exists for this tag, stop here
    - name: Release Already Exists
      if: steps.resolve_release.outputs.is_tag_release == 'true' && steps.check_release.outputs.release_exists == 'true'
      run: |
        echo "Release ${{ steps.resolve_release.outputs.release_tag }} already exists. Skipping tagged release."
        exit 0

    # Step 5: Restore Dependencies
    - name: Restore Dependencies
      if: steps.resolve_release.outputs.is_tag_release != 'true' || steps.check_release.outputs.release_exists == 'false'
      run: dotnet restore ${{ env.Solution_Name }} -r win-x64

    # Step 6: Publish application to a stable output folder
    - name: Publish Application
      if: steps.resolve_release.outputs.is_tag_release != 'true' || steps.check_release.outputs.release_exists == 'false'
      shell: pwsh
      run: |
        $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish-output'
        if (Test-Path -LiteralPath $publishDir) {
          Remove-Item -LiteralPath $publishDir -Recurse -Force
        }

        dotnet publish "${{ env.Project_Path }}" `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --no-restore `
          --output $publishDir

    # Step 7: Create ZIP of artifacts
    - name: Create Zip File
      if: steps.resolve_release.outputs.is_tag_release != 'true' || steps.check_release.outputs.release_exists == 'false'
      shell: pwsh
      run: |
        $publishDir = Join-Path $env:GITHUB_WORKSPACE 'publish-output'
        $archiveSource = Join-Path $publishDir '*'

        if (-not (Test-Path -LiteralPath $publishDir)) {
          Write-Error "Publish output directory not found: $publishDir"
          exit 1
        }

        Compress-Archive -Path $archiveSource -DestinationPath "MagicChatbox-${{ env.VERSION }}.zip" -Force

    - name: Await Tag-Triggered Release Run
      if: steps.resolve_release.outputs.is_tag_release != 'true' && steps.check_release.outputs.release_exists == 'false' && steps.finalize_branch_release.outputs.publish_now != 'true'
      run: echo "Created release tag ${{ steps.resolve_release.outputs.release_tag }} during the branch run. The tag-triggered workflow run will publish the release."

    # Step 8: Upload & Scan with VirusTotal
    - name: Check Optional VirusTotal Secret
      if: steps.check_release.outputs.release_exists == 'false' && (steps.resolve_release.outputs.is_tag_release == 'true' || steps.finalize_branch_release.outputs.publish_now == 'true')
      id: optional_secrets
      env:
        VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      shell: pwsh
      run: |
        $hasVirusTotalKey = -not [string]::IsNullOrWhiteSpace($env:VIRUSTOTAL_API_KEY)
        "has_virustotal_key=$($hasVirusTotalKey.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Upload and Scan with VirusTotal
      if: steps.check_release.outputs.release_exists == 'false' && (steps.resolve_release.outputs.is_tag_release == 'true' || steps.finalize_branch_release.outputs.publish_now == 'true') && steps.optional_secrets.outputs.has_virustotal_key == 'true'
      id: virustotal_scan
      env:
        VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      shell: pwsh
      run: |
        $filePath = Join-Path $env:GITHUB_WORKSPACE "MagicChatbox-${{ env.VERSION }}.zip"
        $apiKey = $env:VIRUSTOTAL_API_KEY

        if (-not (Test-Path -LiteralPath $filePath)) {
          Write-Error "File not found: $filePath"
          exit 1
        }

        $fileInfo = Get-Item $filePath

        if ($fileInfo.Length -gt 32MB) {
          Write-Error "VirusTotal standard upload only supports files up to 32 MB. Use /files/upload_url for larger files."
          exit 1
        }

        $response = Invoke-RestMethod `
          -Uri "https://www.virustotal.com/api/v3/files" `
          -Method Post `
          -Headers @{
            "x-apikey" = $apiKey
          } `
          -Form @{
            "file" = $fileInfo
          }

        $analysisId = $response.data.id
        "scan_id=$analysisId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Wait for VirusTotal Scan Report
      if: steps.check_release.outputs.release_exists == 'false' && (steps.resolve_release.outputs.is_tag_release == 'true' || steps.finalize_branch_release.outputs.publish_now == 'true') && steps.optional_secrets.outputs.has_virustotal_key == 'true'
      id: virustotal_report
      env:
        VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
      shell: pwsh
      run: |
        $apiKey = $env:VIRUSTOTAL_API_KEY
        $analysisId = "${{ steps.virustotal_scan.outputs.scan_id }}"

        if ([string]::IsNullOrWhiteSpace($analysisId)) {
          Write-Error "No VirusTotal analysis ID was returned."
          exit 1
        }

        $maxAttempts = 20
        $delaySeconds = 15
        $sha256 = $null

        for ($i = 1; $i -le $maxAttempts; $i++) {
          Write-Host "Checking VirusTotal analysis status (attempt $i/$maxAttempts)..."

          $response = Invoke-RestMethod `
            -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId" `
            -Method Get `
            -Headers @{
              "x-apikey" = $apiKey
            }

          $status = $response.data.attributes.status
          $sha256 = $response.meta.file_info.sha256

          if ($status -eq "completed" -and -not [string]::IsNullOrWhiteSpace($sha256)) {
            Write-Host "VirusTotal analysis completed. SHA256: $sha256"
            break
          }

          Write-Host "Status: $status — waiting ${delaySeconds}s..."
          Start-Sleep -Seconds $delaySeconds
        }

        if ([string]::IsNullOrWhiteSpace($sha256)) {
          Write-Error "VirusTotal report was not ready after $maxAttempts attempts."
          exit 1
        }

        $reportUrl = "https://www.virustotal.com/gui/file/$sha256/detection"
        "report_url=$reportUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    # Step 9: Determine if this is a pre-release or final release
    - name: Determine Release Type
      if: steps.check_release.outputs.release_exists == 'false' && (steps.resolve_release.outputs.is_tag_release == 'true' || steps.finalize_branch_release.outputs.publish_now == 'true')
      id: determine_release_type
      shell: pwsh
      run: |
        $isTagRelease = '${{ steps.resolve_release.outputs.is_tag_release }}' -eq 'true'

        if (-not $isTagRelease) {
          $isMasterRelease = $env:GITHUB_REF -eq 'refs/heads/master'
        } else {
          git fetch --no-tags origin master Pre-Master

          $tagCommit = git rev-list -n 1 $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tagCommit)) {
            Write-Error "Unable to resolve commit for tag $env:RELEASE_TAG."
            exit 1
          }

          git merge-base --is-ancestor $tagCommit origin/master
          $isMasterRelease = $LASTEXITCODE -eq 0
        }

        if ($isMasterRelease) {
          echo "PRE_RELEASE=false" | Out-File -Append -Encoding utf8 $Env:GITHUB_ENV
          echo "RELEASE_NAME=${{ steps.resolve_release.outputs.release_tag }}" | Out-File -Append -Encoding utf8 $Env:GITHUB_ENV
          "pre_release=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=${{ steps.resolve_release.outputs.release_tag }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
          if ($isTagRelease) {
            git merge-base --is-ancestor $tagCommit origin/Pre-Master
            $isPreMasterRelease = $LASTEXITCODE -eq 0
          } else {
            $isPreMasterRelease = $env:GITHUB_REF -eq 'refs/heads/Pre-Master'
          }

          if (-not $isPreMasterRelease) {
            Write-Warning "Tagged commit is not contained in master or Pre-Master. Defaulting to pre-release."
          }

          echo "PRE_RELEASE=true" | Out-File -Append -Encoding utf8 $Env:GITHUB_ENV
          echo "RELEASE_NAME=${{ steps.resolve_release.outputs.release_tag }} (pre-release)" | Out-File -Append -Encoding utf8 $Env:GITHUB_ENV
          "pre_release=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=${{ steps.resolve_release.outputs.release_tag }} (pre-release)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    # Step 10: Create GitHub Release and upload the asset in a single step
    - name: Create Release
      if: steps.check_release.outputs.release_exists == 'false' && (steps.resolve_release.outputs.is_tag_release == 'true' || steps.finalize_branch_release.outputs.publish_now == 'true')
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.MY_PAT }}
      with:
        tag_name: ${{ steps.resolve_release.outputs.release_tag }}
        name: ${{ steps.determine_release_type.outputs.release_name }}
        draft: false
        prerelease: ${{ steps.determine_release_type.outputs.pre_release }}
        files: ./MagicChatbox-${{ env.VERSION }}.zip
        body: |
          <div align="center">
            <h1>✨ MagicChatbox v${{ env.VERSION }} ✨</h1>
            <img src="https://img.shields.io/github/downloads/BoiHanny/vrcosc-magicchatbox/v${{ env.VERSION }}/total?color=%23AB3BFF&label=Version%20downloads&logo=%20&style=plastic" alt="Version downloads">
          </div>

          > [!IMPORTANT]
          > **We highly recommend reading our [Terms of Service](https://github.com/BoiHanny/vrcosc-magicchatbox/blob/master/Security.md) before you download or use MagicChatBox.**  
          > It doesn't take long to get through the essential points, but it's important to understand how we value and protect your privacy, as well as the rules for using our software.

          <div align="center">
            <p>
              <a href="https://github.com/BoiHanny/vrcosc-magicchatbox/releases/download/${{ steps.resolve_release.outputs.release_tag }}/MagicChatbox-${{ env.VERSION }}.zip">
                <img src="https://custom-icon-badges.herokuapp.com/badge/-Download-%23512BD4?style=for-the-badge&logo=download&logoColor=white" alt="Download">
              </a>
              <a href="${{ steps.virustotal_report.outputs.report_url }}">
                <img src="https://custom-icon-badges.herokuapp.com/badge/-Virus%20Scan%20Result-blue?style=for-the-badge&logo=virustotal&logoColor=white" alt="VirusTotal">
              </a>
            </p>
          </div>

          ---

          <div align="center">
            <h2>🚀 Download and Installation Guide 🚀</h2>
            <p>Follow these simple steps to get started with MagicChatbox:</p>
          </div>

          1. **Download** the .zip file from the link above.
          2. Make sure you have the [**.NET 10 Desktop Runtime**](https://dotnet.microsoft.com/en-us/download/dotnet/10.0) installed on your system.
          3. **Right-click** the downloaded .zip file and select <strong>Extract All</strong>.
          4. Open the extracted folder from your chosen location.
          5. Run <code>MagicChatbox.exe</code> to launch the application.

          ---

          <div align="center">
            <h2>🛡️ About VirusTotal Scan 🛡️</h2>
            <p>We take your security seriously! Each release of MagicChatbox is scanned with VirusTotal to ensure it's free from harmful software.</p>
            <p>However, please be aware that some antivirus engines might flag the application. This is due to the nature of certain components we use, such as:</p>
            <ul>
              <p>🔍 <strong>Window Activity</strong> - To show which windows you are currently focused on</p>
              <p>🔗 <strong>MediaLink Components</strong> - For better multimedia integration</p>
              <p>📊 <strong>Component Stats</strong> - For performance tracking</p>
              <p>🌙 <strong>AFK Module</strong> - To detect when you are away from the keyboard</p>
              <p>🎮 <strong>OSC Controller</strong> - To communicate with VRChat</p>
            </ul>
            <p>These features might trigger warnings from lesser-known scanners. Rest assured, we strive to keep our software as secure as possible and any flagged activity is closely monitored to maintain your safety.</p>
            <p>For more details on the scan results, check the VirusTotal report linked above.</p>
          </div>

          ---

          <div align="center">
            <h2>📞 Need Help? We're Here for You! 📞</h2>
            <p>Have any questions, suggestions, or feedback? Reach out to us through one of the following channels:</p>
            <ul>
              <p><strong>Our Discord:</strong> <a href="https://discord.gg/ZaSFwBfhvG">Join now!!!</a></p>
              <p><strong>GitHub Issues:</strong> <a href="https://github.com/BoiHanny/vrcosc-magicchatbox/issues">Report a bug or submit a feature request</a></p>
              <p><strong>Wiki:</strong> <a href="https://github.com/BoiHanny/vrcosc-magicchatbox/wiki">Help & more</a></p>
            </ul>
            <p>We're committed to providing the best possible experience for our users. Your feedback helps us make MagicChatbox even better. Thank you for your support!</p>
          </div>
